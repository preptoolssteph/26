<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Visual Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf8f3;
  --orange: #FF874d;
  --orange-dark: #c45d0a;
  --text: #2d2416;
  --muted: #9a8f84;
  --edit-bg: #1a1208;
  --edit-card: #251a0e;
  --edit-border: #3d2e1a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Quicksand', sans-serif; background: var(--bg); min-height: 100vh; overflow: hidden; }

#editMode, #runMode { display: none; width: 100vw; height: 100vh; }
#editMode.active { display: flex; flex-direction: row; }
#runMode.active  { display: flex; flex-direction: column; }

.edit-left {
  flex: 1; background: var(--edit-bg);
  display: flex; flex-direction: column;
  overflow-y: auto; padding: 16px 14px 22px; min-width: 0;
}
.edit-right {
  width: 225px; background: #120d06;
  border-left: 1px solid var(--edit-border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}

.page-bar { display: flex; align-items: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
.page-tab {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.7rem;
  background: var(--edit-card); border: 1.5px solid var(--edit-border);
  border-radius: 7px; padding: 4px 10px; color: #9a7850;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.page-tab:hover { border-color: var(--orange); color: #f0d0a0; }
.page-tab.active { background: var(--orange); color: white; border-color: var(--orange); }
.page-tab.add-tab { color: #4ade80; border-color: #4ade80; }
.page-tab.add-tab:hover { background: #4ade80; color: #1a1208; }
.page-tab.del-tab { color: #e94560; border-color: transparent; font-size: 0.62rem; }

.edit-hdr { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.15rem; color: #f0d8b0; margin-bottom: 2px; }
.edit-sub { color: #6a5a3a; font-size: 0.7rem; margin-bottom: 12px; }

.steps-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

.step-card {
  background: var(--edit-card); border-radius: 10px; padding: 9px 11px;
  display: grid; grid-template-columns: 22px 1fr 72px 90px 28px 28px;
  gap: 6px; align-items: center;
  border: 1px solid var(--edit-border); transition: border-color 0.15s;
}
.step-card.drag-over { border-color: var(--orange); background: #2a1e0e; }

.step-sound-row {
  grid-column: 1 / -1; display: flex; align-items: center; gap: 6px; margin-top: 2px;
}
.sound-label { font-size: 0.62rem; color: #6a5a3a; font-weight: 700; white-space: nowrap; }
.sound-select {
  flex: 1; font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 0.72rem;
  background: #120d06; border: 1.5px solid #3d2e1a;
  border-radius: 6px; padding: 4px 7px; color: #c0a870; outline: none; cursor: pointer;
}
.sound-select:focus { border-color: var(--orange); }

.step-num { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.95rem; color: var(--orange); text-align: center; }
.step-lbl {
  font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.85rem;
  background: #120d06; border: 1.5px solid #3d2e1a;
  border-radius: 6px; padding: 5px 7px; color: #f0e0c0; outline: none; width: 100%;
}
.step-lbl:focus { border-color: var(--orange); }

.step-thumb {
  width: 100%; aspect-ratio: 1; border-radius: 6px; overflow: hidden;
  background: #120d06; border: 1.5px dashed #3d2e1a;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.15s;
}
.step-thumb:hover { border-color: var(--orange); }
.step-thumb.has-img { border-style: solid; border-color: #4ade80; }
.step-thumb img { width: 100%; height: 100%; object-fit: contain; }
.step-thumb .tp { font-size: 0.85rem; color: #4a3a20; }

/* FIXED: wider time input so 2-digit numbers are visible */
.time-wrap {
  display: flex; align-items: center; gap: 4px;
  background: #120d06; border: 1.5px solid #3d2e1a; border-radius: 6px; padding: 5px 8px;
  width: 90px;
}
.time-wrap:focus-within { border-color: var(--orange); }
.time-inp {
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.95rem;
  background: transparent; border: none; color: var(--orange);
  outline: none; width: 52px; text-align: center; min-width: 52px;
}
.time-unit { font-size: 0.6rem; color: #5a4a28; font-weight: 700; white-space: nowrap; }

.ic-btn {
  background: #2a1e0e; border: none; border-radius: 5px;
  width: 24px; height: 24px; color: #6a5a3a; font-size: 0.7rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.ic-btn:hover { background: var(--orange); color: white; }
.ic-btn.del:hover { background: #e94560; }

.edit-actions { display: flex; gap: 7px; flex-wrap: wrap; }
.ebtn { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.78rem; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: all 0.12s; }
.ebtn-go  { background: var(--orange); color: white; }
.ebtn-go:hover { background: var(--orange-dark); }
.ebtn-add { background: #1a3020; color: #4ade80; border: 1.5px solid #4ade80; }
.ebtn-add:hover { background: #4ade80; color: #1a1208; }
.ebtn-clr { background: #251a0e; color: #6a5a3a; }
.ebtn-clr:hover { background: #2a1e0e; }

.lib-hdr { padding: 10px 12px 6px; flex-shrink: 0; border-bottom: 1px solid #1e1408; }
.lib-hdr-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.82rem; color: #f0d0a0; }
.lib-page-name { font-size: 0.62rem; color: var(--orange); font-weight: 700; margin-top: 1px; }
.lib-sub { font-size: 0.6rem; color: #4a3a20; margin-top: 1px; }
.lib-grid { flex: 1; overflow-y: auto; min-height: 0; padding: 8px; display: grid; grid-template-columns: repeat(var(--lib-cols, 3), 1fr); gap: 6px; align-content: start; }
.lib-item {
  background: #1e1408; border-radius: 7px; overflow: hidden;
  cursor: grab; border: 1.5px solid #2a1e0e;
  transition: border-color 0.12s, transform 0.12s;
  display: flex; flex-direction: column; align-items: center; position: relative;
}
.lib-item:hover { border-color: var(--orange); transform: scale(1.06); }
.lib-item img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #120d06; padding: 3px; }
.lib-item .lib-name { font-size: 0.5rem; font-weight: 700; color: #6a5a3a; padding: 2px 3px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lib-item .lib-del { position: absolute; top: 2px; right: 2px; background: rgba(233,69,96,0.85); color: white; border: none; border-radius: 3px; font-size: 0.5rem; width: 13px; height: 13px; cursor: pointer; display: none; align-items: center; justify-content: center; }
.lib-item:hover .lib-del { display: flex; }
.lib-empty { color: #4a3a20; font-size: 0.65rem; grid-column: 1/-1; text-align: center; padding: 16px 8px; line-height: 1.5; }
.lib-add-btn { margin: 6px 8px 8px; flex-shrink: 0; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.7rem; background: #1a3020; color: #4ade80; border: 1.5px solid #4ade80; border-radius: 6px; padding: 6px; cursor: pointer; width: calc(100% - 16px); transition: all 0.12s; }
.lib-add-btn:hover { background: #4ade80; color: #1a1208; }

.lib-resize-handle { width: 6px; cursor: col-resize; background: transparent; flex-shrink: 0; position: relative; z-index: 10; transition: background 0.15s; }
.lib-resize-handle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 3px; height: 36px; border-radius: 3px; background: #3d2e1a; transition: background 0.15s, height 0.15s; }
.lib-resize-handle:hover::after, .lib-resize-handle.dragging::after { background: var(--orange); height: 56px; width: 4px; }
.lib-resize-handle:hover, .lib-resize-handle.dragging { background: rgba(255,135,77,0.08); }

.edit-right.drag-over { background: #1a2a10 !important; }
.edit-right.drag-over .lib-grid { outline: 2px dashed #4ade80; outline-offset: -4px; border-radius: 6px; }
.lib-drop-hint { display: none; color: #4ade80; font-size: 0.6rem; font-weight: 700; text-align: center; padding: 4px 7px; flex-shrink: 0; }
.edit-right.drag-over .lib-drop-hint { display: block; }

.lib-size-row { display: flex; align-items: center; gap: 5px; padding: 5px 8px 3px; flex-shrink: 0; }
.lib-size-row .sz-icon { font-size: 0.55rem; color: #6a5a3a; user-select: none; }
.lib-size-row input[type=range] { flex: 1; height: 3px; -webkit-appearance: none; appearance: none; background: #2a1e0e; border-radius: 2px; outline: none; cursor: pointer; }
.lib-size-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--orange); cursor: pointer; }
.lib-size-row input[type=range]::-moz-range-thumb { width: 12px; height: 12px; border: none; border-radius: 50%; background: var(--orange); cursor: pointer; }

#runMode { background: var(--bg); position: relative; transition: background 0.1s; }
#runMode.flash { background: #fff0e0; }
.teacher-bar { position: absolute; top: 6px; right: 8px; display: flex; gap: 4px; z-index: 20; opacity: 0.2; transition: opacity 0.2s; }
.teacher-bar:hover { opacity: 1; }
.tbtn { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.6rem; border: none; border-radius: 5px; padding: 3px 8px; cursor: pointer; background: #2d2010; color: var(--orange); transition: all 0.12s; }
.tbtn:hover { background: var(--orange); color: white; }
.tbtn.d { color: #e94560; }
.tbtn.d:hover { background: #e94560; color: white; }

.run-stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 16px 6px; gap: 16px; overflow: hidden; }

.step-tile { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; max-width: 210px; min-width: 0; transition: all 0.35s ease; }
.step-tile.done   { opacity: 0.45; transform: scale(0.88); }
.step-tile.active { flex: 1.9; max-width: 290px; }

.tile-name { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.95rem; color: var(--text); text-align: center; transition: all 0.3s; }
.step-tile.active .tile-name { font-size: 1.25rem; color: var(--orange-dark); }
.step-tile.done   .tile-name { color: var(--muted); }

.circle-wrap { position: relative; width: 100%; aspect-ratio: 1; max-width: 240px; transition: max-width 0.35s; cursor: pointer; }
.step-tile.active .circle-wrap { max-width: 340px; }

.img-layer { position: absolute; inset: 3%; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #ede5da; transition: filter 0.5s; }
.step-tile.done .img-layer { filter: saturate(0.15) brightness(0.78); }
.tile-img { width: 70%; height: 70%; object-fit: contain; }
.tile-emoji { font-size: 2.2rem; opacity: 0.4; }

.pie-svg { position: absolute; inset: 3%; width: 94%; height: 94%; pointer-events: none; overflow: visible; border-radius: 50%; }
.ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
.done-circle { position: absolute; inset: 3%; border-radius: 50%; background: rgba(180,168,155,0.55); display: none; align-items: center; justify-content: center; font-size: 2.2rem; }
.step-tile.done .done-circle { display: flex; }

.tile-time { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.75rem; color: var(--muted); text-align: center; }
.step-tile.active .tile-time { font-size: 0.85rem; color: var(--orange-dark); }

.run-bottom { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 5px 14px 11px; flex-shrink: 0; opacity: 0.25; transition: opacity 0.2s; }
.run-bottom:hover { opacity: 1; }
.cbtn { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.7rem; border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: all 0.12s; }
.cbtn-play { background: #2d2010; color: var(--orange); }
.cbtn-play:hover { background: var(--orange); color: white; }
.cbtn-nav  { background: #2d2010; color: #9a8060; }
.cbtn-nav:hover { background: #3a2810; color: #f0d0a0; }
.cinfo { font-size: 0.65rem; color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 700; min-width: 50px; text-align: center; }
</style>
</head>
<body>
<div id="editMode" class="active">
  <div class="edit-left">
    <div class="edit-hdr">Visual Schedule</div>
    <a href="index.html" style="font-family:'Nunito',sans-serif;font-weight:700;font-size:0.55rem;color:var(--orange);text-decoration:none;display:inline-block;border:1.5px solid var(--orange);border-radius:5px;padding:2px 8px;margin-bottom:4px;transition:all 0.12s;" onmouseover="this.style.background='var(--orange)';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='var(--orange)'">🏠 Home</a>
    <span id="sbDot" title="Sync status" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4a3a20;margin-left:4px;vertical-align:middle;flex-shrink:0;"></span>
    <p class="edit-sub">Set steps, images, times and sounds. Each page has its own image library.</p>
    <div class="page-bar" id="pageTabs"></div>
    <div class="steps-list" id="stepsList"></div>
    <div class="edit-actions">
      <button class="ebtn ebtn-add" onclick="addStep()">+ Step</button>
      <button class="ebtn ebtn-go"  onclick="startRun()">GO — Show on Board</button>
      <button class="ebtn ebtn-clr" onclick="clearPage()">Clear</button>
    </div>
    <div class="edit-actions" style="margin-top:4px;">
      <button class="ebtn" style="background:#1a2030;color:#64b5f6;" onclick="exportData()">📤 Share to Board</button>
      <button class="ebtn" style="background:#1a2030;color:#64b5f6;" onclick="document.getElementById('importFile').click()">📥 Load from File</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div class="lib-resize-handle" id="libResizeHandle"></div>
  <div class="edit-right" id="editLibrary">
    <div class="lib-hdr">
      <div class="lib-hdr-title">Image Library</div>
      <div class="lib-page-name" id="libPageName"></div>
      <div class="lib-sub">Drag onto step · hover to remove</div>
    </div>
    <div class="lib-size-row">
      <span class="sz-icon">🔍−</span>
      <input type="range" id="libSizeSlider" min="1" max="6" value="3" oninput="setLibCols(+this.value)">
      <span class="sz-icon">+</span>
    </div>
    <div class="lib-grid" id="libGrid"></div>
    <div class="lib-drop-hint">Drop images here!</div>
    <button class="lib-add-btn" onclick="addLibImgs()">+ Add Images</button>
    <button class="lib-add-btn" onclick="openSharedLib()" style="background:#1a2030;color:#64b5f6;border-color:#64b5f6;">📸 From Shared Library</button>
    <div class="lib-sub" style="text-align:center;padding:0 7px 6px;font-size:0.52rem;">or drag & drop images here</div>
    <input type="file" id="libFileIn" accept="image/*" style="display:none" multiple onchange="onLibFiles(event)">
  </div>
</div>

<!-- SHARED LIBRARY MODAL -->
<div id="sharedLibModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;flex-direction:column;padding:20px;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0;">
    <input type="text" id="sharedLibSearch" placeholder="🔍 Search images..." oninput="renderSharedLib()"
      style="flex:1;padding:8px 12px;border:1.5px solid #3d2e1a;border-radius:6px;background:#2a1e0e;color:#fdf6ee;font-family:'Nunito',sans-serif;font-size:0.7rem;">
    <span id="sharedLibCount" style="font-size:0.55rem;color:#6a5a3a;font-weight:700;"></span>
    <button onclick="closeSharedLib()" style="border:none;background:#3d2e1a;color:#ef5350;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.7rem;padding:8px 16px;border-radius:6px;cursor:pointer;">✕ Close</button>
  </div>
  <div style="font-size:0.5rem;color:#6a5a3a;margin-bottom:8px;flex-shrink:0;">Click an image to add it to this page's library</div>
  <div id="sharedLibGrid" style="flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-content:start;"></div>
</div>

<div id="runMode">
  <div class="teacher-bar">
    <button class="tbtn" onclick="goEdit()">Edit</button>
    <button class="tbtn d" onclick="resetRun()">Reset</button>
  </div>
  <div class="run-stage" id="runStage"></div>
  <div class="run-bottom">
    <button class="cbtn cbtn-nav" onclick="skipBack()">◀ Back</button>
    <button class="cbtn cbtn-play" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="cbtn cbtn-nav" onclick="skipNext()">Skip ▶▶</button>
    <div class="cinfo" id="stepInfo">1 / 1</div>
  </div>
</div>

<script>
const SOUNDS = {
  none:         { label:'No sound',         icon:'—'  },
  light_rain:   { label:'Light Rain',       icon:'🌧' },
  heavy_rain:   { label:'Heavy Rain',       icon:'⛈' },
  tin_roof:     { label:'Rain on Tin Roof', icon:'🏠' },
  forest:       { label:'Forest & Birds',   icon:'🌳' },
  ocean:        { label:'Ocean Waves',      icon:'🌊' },
  stream:       { label:'Creek & Stream',   icon:'💧' },
  singing_bowl: { label:'Singing Bowl',     icon:'🎵' },
  piano:        { label:'Classical Piano',  icon:'🎹' },
};

// ── SONG LIBRARY (unlimited uploads) ──────────────────────────
let mySongs = [];
try { mySongs = JSON.parse(localStorage.getItem('ct_songs')) || []; } catch(e){ mySongs=[]; }
function saveMySongs(){ try{localStorage.setItem('ct_songs',JSON.stringify(mySongs));}catch(e){alert('Storage full — try deleting some songs.');} }

function uploadMySongs(){
  const inp = document.createElement('input'); inp.type='file'; inp.accept='audio/*'; inp.multiple=true;
  inp.onchange = e => {
    const files = Array.from(e.target.files); let done=0;
    files.forEach(f=>{
      if(f.size>4*1024*1024){alert(f.name+' too large (max 4MB). Skipping.');done++;return;}
      const fr=new FileReader();fr.onload=ev=>{
        mySongs.push({name:f.name.replace(/\.[^.]+$/,''),data:ev.target.result});
        if(++done===files.length){saveMySongs();renderSteps();alert(files.length+' song(s) added!');}
      };fr.readAsDataURL(f);
    });
  }; inp.click();
}

let audioCtx=null,soundNodes=[],soundLoops=[],soundGain=null,customSongAudio=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function stopSound(){soundLoops.forEach(id=>clearInterval(id));soundLoops=[];soundNodes.forEach(n=>{try{n.stop();}catch(e){}});soundNodes=[];if(soundGain){try{soundGain.disconnect();}catch(e){}soundGain=null;}if(customSongAudio){customSongAudio.pause();customSongAudio.currentTime=0;customSongAudio=null;}}
function startSound(key){
  stopSound();if(!key||key==='none')return;
  // Check if it's a song from the library
  if(key.startsWith('song_')){
    const idx=parseInt(key.split('_')[1]);
    if(mySongs[idx]){
      customSongAudio=new Audio(mySongs[idx].data);
      customSongAudio.loop=true;customSongAudio.volume=0.5;
      customSongAudio.play().catch(err=>{console.error(err);});
    }
    return;
  }
  const ctx=getCtx();soundGain=ctx.createGain();
  soundGain.gain.setValueAtTime(0,ctx.currentTime);
  soundGain.gain.linearRampToValueAtTime(0.5,ctx.currentTime+1.8);
  soundGain.connect(ctx.destination);
  switch(key){
    case 'light_rain':   makeRain(ctx,soundGain,0.38,3000,9000);break;
    case 'heavy_rain':   makeRain(ctx,soundGain,0.7,200,4000);break;
    case 'tin_roof':     makeTinRoof(ctx,soundGain);break;
    case 'forest':       makeForest(ctx,soundGain);break;
    case 'ocean':        makeOcean(ctx,soundGain);break;
    case 'stream':       makeStream(ctx,soundGain);break;
    case 'singing_bowl': makeSingingBowl(ctx,soundGain);break;
    case 'piano':        makePiano(ctx,soundGain);break;
  }
}

// customSongAudio declared before stopSound so it's in scope

// ── SHARED IMAGE LIBRARY ──────────────────────────────────────
function getSharedImages(){
  try{ return JSON.parse(localStorage.getItem('imglib_images')) || []; }catch(e){return [];}
}
function openSharedLib(){
  const modal = document.getElementById('sharedLibModal');
  modal.style.display = 'flex';
  document.getElementById('sharedLibSearch').value = '';
  renderSharedLib();
}
function closeSharedLib(){document.getElementById('sharedLibModal').style.display='none';}
function renderSharedLib(){
  const imgs = getSharedImages();
  const query = (document.getElementById('sharedLibSearch').value||'').toLowerCase().trim();
  const filtered = imgs.filter(img => !query || img.name.toLowerCase().includes(query));
  document.getElementById('sharedLibCount').textContent = filtered.length + ' of ' + imgs.length + ' images';
  const grid = document.getElementById('sharedLibGrid');
  grid.innerHTML = '';
  if(imgs.length === 0){
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6a5a3a;font-size:0.7rem;font-weight:700;">No images in shared library yet!<br>Add images in the 📸 Image Library tool first.</div>';
    return;
  }
  filtered.forEach(img => {
    const card = document.createElement('div');
    card.style.cssText = 'background:#2a1e0e;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.12s;';
    card.onmouseover = ()=>card.style.borderColor='#4ade80';
    card.onmouseout = ()=>card.style.borderColor='transparent';

// Compress image but keep transparency (PNG for transparent, JPEG for opaque)
async function compressImg(b64,maxW=900){
  return new Promise(res=>{
    const img=new Image()
    img.onload=()=>{
      const scale=Math.min(1,maxW/Math.max(img.width,img.height))
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale)
      const c=document.createElement('canvas');c.width=w;c.height=h
      const ctx2=c.getContext('2d')
      // white background only for JPEG, transparent for PNG
      const isTransparent=b64.includes('data:image/png')
      if(!isTransparent){ctx2.fillStyle='#ede5da';ctx2.fillRect(0,0,w,h)}
      ctx2.drawImage(img,0,0,w,h)
      // use PNG if original was PNG (keeps transparency), JPEG otherwise
      const out=isTransparent?c.toDataURL('image/png'):c.toDataURL('image/jpeg',0.82)
      res(out)
    }
    img.onerror=()=>res(b64)
    img.src=b64
  })
}

async function uploadImg(b64,name){
  try{
    const sb=getSb()
    const compressed=await compressImg(b64)
    const blob=await(await fetch(compressed)).blob()
    const ext=blob.type.includes('png')?'png':'jpg'
    const path=Date.now()+'_'+name.replace(/[^a-z0-9]/gi,'_')+'.'+ext
    const{error}=await sb.storage.from(SB_BUCKET).upload(path,blob,{upsert:true})
    if(error)throw error
    return sb.storage.from(SB_BUCKET).getPublicUrl(path).data.publicUrl
  }catch(e){console.warn('Upload failed:',e);return null}
}

      <div class="circle-wrap" id="cw${i}">
        <div class="img-layer">${getImgSrc(s)?`<img class="tile-img" src="${getImgSrc(s)}">`:`<div class="tile-emoji">📋</div>`}</div>
        <svg class="pie-svg" viewBox="0 0 100 100" id="pie${i}">
          <defs><clipPath id="cc${i}"><circle cx="50" cy="50" r="50"/></clipPath></defs>
          <path id="piePath${i}" fill="rgba(148,136,124,0.58)" d="" clip-path="url(#cc${i})"/>
        </svg>
        <svg class="ring-svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${R}" fill="none" stroke="${done[i]?'#ccc4bc':'#e8ddd4'}" stroke-width="3.5"/>
          <circle cx="50" cy="50" r="${R}" fill="none" stroke="${done[i]?'#ccc4bc':'#FF874d'}" stroke-width="3.5"
                  stroke-dasharray="${C}" stroke-dashoffset="${offset}"
                  stroke-linecap="round" transform="rotate(-90 50 50)" id="arc${i}"/>
        </svg>
        <div class="done-circle">✓</div>
      </div>
      <div class="tile-time">${s.minutes} min${s.minutes!==1?'s':''}</div>
    `;
    tile.querySelector('.circle-wrap').addEventListener('click',()=>{if(i===cur&&!done[i]){togglePlay();}else{jumpTo(i);}});
    tile.querySelector('.tile-name').addEventListener('click',()=>jumpTo(i));
    stage.appendChild(tile);
    drawPie(i,frac);
  });
  document.getElementById('stepInfo').textContent=`${cur+1} / ${ss.length}`;
}

function drawPie(i,frac){
  const elapsed=1-frac,path=document.getElementById(`piePath${i}`);
  if(!path)return;
  if(elapsed<=0){path.setAttribute('d','');return;}
  if(elapsed>=0.9999){path.setAttribute('d','M50,50 m-60,-60 h120 v120 h-120 z');return;}
  const angle=elapsed*2*Math.PI,x=50+50*Math.sin(angle),y=50-50*Math.cos(angle),large=elapsed>0.5?1:0;
  path.setAttribute('d',`M50,50 L50,0 A50,50 0 ${large},1 ${x},${y} Z`);
}

function updateDisplay(){
  const frac=secsLeft/secsTotal,R=46,C=2*Math.PI*R;
  const arc=document.getElementById(`arc${cur}`);
  if(arc)arc.setAttribute('stroke-dashoffset',C*(1-frac));
  drawPie(cur,frac);
  if(secsLeft<=10&&!warned){warned=true;playWarn();let fl=0;const id=setInterval(()=>{document.getElementById('runMode').classList.toggle('flash');if(++fl>=6){clearInterval(id);document.getElementById('runMode').classList.remove('flash');}},300);}
}

function togglePlay(){if(running){pause();}else{play();}}
function play(){running=true;document.getElementById('playBtn').textContent='⏸ Pause';startSound(steps()[cur].sound||'none');ticker=setInterval(()=>{secsLeft--;updateDisplay();if(secsLeft<=0){clearInterval(ticker);running=false;stepDone(cur);}},1000);}
function pause(){running=false;clearInterval(ticker);stopSound();document.getElementById('playBtn').textContent='▶ Play';}
function stepDone(i){done[i]=true;stopSound();document.getElementById('runMode').classList.remove('flash');playChime();setTimeout(()=>{let next=-1;for(let j=i+1;j<steps().length;j++){if(!done[j]){next=j;break;}}if(next>=0){cur=next;setTimer(cur);renderRun();document.getElementById('playBtn').textContent='⏸ Pause';play();}else{renderRun();document.getElementById('playBtn').textContent='All Done!';}},800);}
function skipNext(){clearInterval(ticker);running=false;stopSound();done[cur]=true;document.getElementById('runMode').classList.remove('flash');document.getElementById('playBtn').textContent='▶ Play';let next=-1;for(let j=cur+1;j<steps().length;j++){if(!done[j]){next=j;break;}}if(next>=0){cur=next;setTimer(cur);}renderRun();}
function skipBack(){clearInterval(ticker);running=false;stopSound();document.getElementById('runMode').classList.remove('flash');document.getElementById('playBtn').textContent='▶ Play';if(cur>0){done[cur]=false;cur--;done[cur]=false;setTimer(cur);}renderRun();}
function jumpTo(i){clearInterval(ticker);running=false;stopSound();document.getElementById('runMode').classList.remove('flash');document.getElementById('playBtn').textContent='▶ Play';done[i]=false;cur=i;setTimer(i);renderRun();}

renderTabs();renderSteps();renderLib();

// ── SHARE TO BOARD — EXPORT / IMPORT ──────────────────────────
function exportData(){
  const data = {
    app: 'ClassTimer',
    version: 1,
    pages: pages,
    curPage: curPage,
    nid: nid,
    customSong: null,
    customSongName: null,
    mySongs: mySongs,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'timer-share.json';
  a.click();
  URL.revokeObjectURL(url);
  alert('Saved! Put this file on Google Drive or USB, then open it on your smartboard with "Load from File".');
}

function importData(e){
  const f = e.target.files[0]; if(!f) return;
  const fr = new FileReader();
  fr.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.app !== 'ClassTimer'){ alert('Wrong file — this is not a ClassTimer share file.'); return; }
      pages = data.pages;
      curPage = data.curPage || 0;
      nid = data.nid || 100;
      if(data.mySongs) { mySongs = data.mySongs; saveMySongs(); }
      saveAll();
      renderTabs(); renderSteps(); renderLib();
      alert('Loaded! All pages and images are ready.');
    } catch(err) { alert('Could not read file: ' + err.message); }
  };
  fr.readAsText(f);
  e.target.value = '';
}

// ── STARTUP: load Supabase then sync ──────────────────────────
(async()=>{
  try{
    const mod=await import('https://esm.sh/@supabase/supabase-js@2')
    window._sbLib={createClient:mod.createClient}
    pullFromCloud()
  }catch(e){console.warn('Supabase unavailable, using local only')}
})();
</script>
