<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Name Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1e1408;--bg2:#2a1e0e;--bg3:#3d2e1a;--cream:#fdf6ee;--cream2:#f5eddf;--orange:#ff874d;--green:#4ade80;--red:#ef5350;--blue:#64b5f6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--cream);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
.top-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border-bottom:2px solid var(--bg3);flex-shrink:0;}
.top-bar a{font-weight:700;font-size:0.6rem;color:var(--orange);text-decoration:none;border:1.5px solid var(--orange);border-radius:5px;padding:3px 8px;transition:all 0.12s;}
.top-bar a:hover{background:var(--orange);color:#fff;}
.top-bar h1{font-size:0.9rem;font-weight:900;color:var(--orange);flex:1;}
.top-btn{border:none;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.55rem;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all 0.12s;background:var(--bg3);color:var(--cream);}
.top-btn:hover{background:var(--orange);color:#fff;}

.main{flex:1;display:flex;overflow:hidden;}

/* ── DISPLAY SIDE ─────────────────────────────── */
.display-side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:30px;}
.picked-name{font-size:5rem;font-weight:900;color:var(--orange);text-align:center;min-height:80px;transition:all 0.3s;}
.picked-name.spinning{animation:spin-text 0.08s linear infinite;font-size:3rem;color:var(--cream);}
@keyframes spin-text{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
.pick-btn{
  border:none;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:1.3rem;padding:20px 50px;border-radius:16px;cursor:pointer;
  background:var(--orange);color:#fff;transition:all 0.15s;
  box-shadow:0 4px 20px rgba(255,135,77,0.3);
}
.pick-btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(255,135,77,0.4);}
.pick-btn:active{transform:scale(0.97);}
.pick-sub{font-size:0.6rem;color:#6a5a3a;font-weight:700;}
.reset-link{font-size:0.55rem;color:var(--blue);cursor:pointer;font-weight:700;text-decoration:underline;}

/* ── NAMES PANEL ──────────────────────────────── */
.names-panel{width:260px;background:var(--bg2);border-left:2px solid var(--bg3);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.panel-hdr{padding:10px;font-size:0.7rem;font-weight:800;color:var(--orange);border-bottom:1px solid var(--bg3);}
.panel-hdr .count{font-size:0.5rem;color:#6a5a3a;font-weight:700;}
.names-list{flex:1;overflow-y:auto;padding:6px;}
.name-item{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  border-radius:5px;font-size:0.65rem;font-weight:700;
  margin-bottom:2px;transition:all 0.12s;cursor:default;
}
.name-item:hover{background:var(--bg3);}
.name-item.picked{opacity:0.3;text-decoration:line-through;}
.name-item .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.name-item.picked .dot{background:#4a3a20;}
.name-item .del{margin-left:auto;color:var(--red);cursor:pointer;font-size:0.5rem;display:none;}
.editing .name-item .del{display:block;}

.add-row{padding:8px;border-top:1px solid var(--bg3);display:flex;gap:4px;}
.add-input{
  flex:1;padding:5px 8px;border:1.5px solid var(--bg3);border-radius:5px;
  background:var(--bg);color:var(--cream);font-family:'Nunito',sans-serif;font-size:0.6rem;
}
.add-btn{
  border:none;background:var(--green);color:#1a3020;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:0.6rem;padding:5px 10px;border-radius:5px;cursor:pointer;
}
.bulk-btn{
  display:block;width:calc(100% - 16px);margin:4px 8px 8px;padding:5px;
  border:1px dashed var(--bg3);background:transparent;color:#6a5a3a;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:0.5rem;
  border-radius:5px;cursor:pointer;text-align:center;
}
.bulk-btn:hover{border-color:var(--orange);color:var(--orange);}
</style>
</head>
<body>
<div class="top-bar">
  <a href="index.html">🏠 Home</a>
  <h1>🎲 Name Picker</h1>
  <button class="top-btn" onclick="toggleEdit()" id="editBtn">✏️ Edit</button>
  <button class="top-btn" style="background:#1a2030;color:var(--blue);" onclick="exportNames()">📤</button>
  <button class="top-btn" style="background:#1a2030;color:var(--blue);" onclick="document.getElementById('importFile').click()">📥</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importNames(event)">
</div>

<div class="main">
  <div class="display-side">
    <div class="picked-name" id="pickedName">Ready!</div>
    <button class="pick-btn" onclick="pick()">🎲 Pick a Name</button>
    <div class="pick-sub" id="pickSub">Add names in the panel →</div>
    <span class="reset-link" onclick="resetAll()">↺ Reset all names</span>
  </div>

  <div class="names-panel" id="namesPanel">
    <div class="panel-hdr">
      Class List <span class="count" id="nameCount"></span>
    </div>
    <div class="names-list" id="namesList"></div>
    <div class="add-row">
      <input class="add-input" id="addInput" placeholder="Add name..." onkeydown="if(event.key==='Enter')addName()">
      <button class="add-btn" onclick="addName()">+</button>
    </div>
    <button class="bulk-btn" onclick="bulkAdd()">📋 Paste class list (one name per line)</button>
  </div>
</div>

<script>
function save(k,v){try{localStorage.setItem('np_'+k,JSON.stringify(v));}catch(e){}}
function load(k,d){try{const v=localStorage.getItem('np_'+k);return v?JSON.parse(v):d;}catch(e){return d;}}

let names = load('names', []);  // [{name, picked}]
let editing = false;

function render(){
  const list = document.getElementById('namesList');
  list.innerHTML = '';
  document.getElementById('namesPanel').classList.toggle('editing', editing);
  document.getElementById('editBtn').style.background = editing ? '#1a3020' : '';
  document.getElementById('editBtn').style.color = editing ? 'var(--green)' : '';

  const remaining = names.filter(n => !n.picked).length;
  document.getElementById('nameCount').textContent = `(${remaining}/${names.length} remaining)`;

  names.forEach((n, i) => {
    const div = document.createElement('div');
    div.className = 'name-item' + (n.picked ? ' picked' : '');
    div.innerHTML = `<span class="dot"></span>${n.name}<span class="del" onclick="event.stopPropagation();deleteName(${i})">✕</span>`;
    list.appendChild(div);
  });
}

function addName(){
  const inp = document.getElementById('addInput');
  const val = inp.value.trim();
  if(!val) return;
  names.push({name: val, picked: false});
  save('names', names);
  inp.value = '';
  render();
}

function bulkAdd(){
  const text = prompt('Paste your class list (one name per line):');
  if(!text) return;
  const newNames = text.split('\n').map(n => n.trim()).filter(n => n.length > 0);
  newNames.forEach(n => names.push({name: n, picked: false}));
  save('names', names);
  render();
}

function deleteName(i){
  names.splice(i, 1);
  save('names', names);
  render();
}

function toggleEdit(){ editing = !editing; render(); }

function resetAll(){
  names.forEach(n => n.picked = false);
  save('names', names);
  render();
  document.getElementById('pickedName').textContent = 'Ready!';
  document.getElementById('pickedName').className = 'picked-name';
  document.getElementById('pickSub').textContent = names.length + ' names in the hat';
}

function pick(){
  const available = names.filter(n => !n.picked);
  if(available.length === 0){
    document.getElementById('pickedName').textContent = 'All done!';
    document.getElementById('pickSub').textContent = 'Click reset to start over';
    return;
  }

  // Spin animation
  const display = document.getElementById('pickedName');
  display.className = 'picked-name spinning';
  let spins = 0;
  const maxSpins = 15 + Math.floor(Math.random() * 10);
  const spinInterval = setInterval(() => {
    const rand = available[Math.floor(Math.random() * available.length)];
    display.textContent = rand.name;
    spins++;
    if(spins >= maxSpins){
      clearInterval(spinInterval);
      // Pick for real
      const winner = available[Math.floor(Math.random() * available.length)];
      const idx = names.findIndex(n => n === winner);
      names[idx].picked = true;
      save('names', names);
      display.textContent = winner.name;
      display.className = 'picked-name';
      const remaining = names.filter(n => !n.picked).length;
      document.getElementById('pickSub').textContent = remaining + ' names left';
      render();
    }
  }, 80);
}

// Export/Import
function exportNames(){
  const data = {app:'NamePicker',version:1,names:names,exportDate:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');a.href=url;a.download='namepicker-share.json';a.click();
  URL.revokeObjectURL(url);
  alert('Saved!');
}
function importNames(e){
  const f=e.target.files[0];if(!f)return;
  const fr=new FileReader();fr.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.app!=='NamePicker'){alert('Wrong file.');return;}
      names=data.names||[];save('names',names);render();
      alert('Loaded '+names.length+' names!');
    }catch(err){alert('Could not read: '+err.message);}
  };fr.readAsText(f);e.target.value='';
}

render();
if(names.length>0) document.getElementById('pickSub').textContent = names.filter(n=>!n.picked).length+' names in the hat';
</script>
</body>
</html>
