:root {
  --font: 'VIC Modern Cursive', cursive;
  --letter-size: 52px;
  --wb-bg: #ffffff;
  --line-blue: rgba(100,140,200,0.2);
  --line-red: rgba(200,100,100,0.18);
  --outer-bg: #e8f4fc;
  --border-color: #5aade0;
}
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--outer-bg); }
body { display: flex; align-items: center; justify-content: center; padding: 10px; }

/* ── OUTER WHITEBOARD FRAME ─────────────────────────────────── */
.wb-frame {
  width: 100%; height: 100%;
  background: var(--wb-bg);
  border: 8px solid var(--border-color);
  border-radius: 22px;
  box-shadow: 0 4px 24px rgba(90,173,224,0.25), inset 0 2px 8px rgba(90,173,224,0.08);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

/* ── TOP TOOLBAR (settings only — teacher reach) ─────────────── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; background: rgba(90,173,224,0.12);
  border-bottom: 1px solid rgba(90,173,224,0.2);
  flex-shrink: 0;
}
.top-bar-title {
  font-family: var(--font); font-size: 0.85rem; font-weight: 700;
  color: #3a7aaa; letter-spacing: 0.5px;
}
.settings-btn {
  font-family: var(--font); font-weight: 700; font-size: 0.75rem;
  border: 1.5px solid #5aade0; border-radius: 7px; padding: 4px 10px;
  background: white; color: #3a7aaa; cursor: pointer; transition: all 0.15s;
}
.settings-btn:hover { background: #5aade0; color: white; }

/* ── WHITEBOARD AREA ─────────────────────────────────────────── */
.wb-area {
  flex: 1; position: relative; overflow: hidden;
  background: var(--wb-bg); cursor: default;
}
.wb-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.wb-svg.hidden { display: none; }

/* letters on whiteboard */
.wb-letter {
  position: absolute; cursor: grab; z-index: 5;
  font-family: var(--font); font-size: var(--letter-size);
  color: #1a1a1a; line-height: 1;
  touch-action: none;
}
.wb-letter:active { cursor: grabbing; z-index: 20; }

/* duster cursor */
.duster-cursor {
  position: absolute; pointer-events: none; z-index: 50;
  transform: translate(-50%, -50%); line-height: 0;
  display: none;
}
.duster-cursor.visible { display: block; }

/* ── LETTER TRAY ─────────────────────────────────────────────── */
.letter-tray {
  flex-shrink: 0; background: rgba(90,173,224,0.08);
  border-top: 1px solid rgba(90,173,224,0.2);
  padding: 6px 8px 4px;
}
.tray-label {
  font-family: var(--font); font-size: 0.52rem; font-weight: 700;
  color: #7aaaca; text-align: center; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 2px;
}
.tray-row {
  display: flex; align-items: center; justify-content: center;
  gap: 0px; flex-wrap: nowrap; overflow-x: auto;
  padding-bottom: 2px;
}
.tray-letter {
  font-family: var(--font); font-size: 1.9rem;
  color: #1a1a1a; cursor: grab;
  padding: 1px 3px; border-radius: 4px;
  transition: color 0.12s, transform 0.1s;
  flex-shrink: 0; touch-action: none; line-height: 1.1;
}
.tray-letter:hover { color: #f97316; transform: scale(1.22); }
.tray-letter:active { cursor: grabbing; }
.tray-divider { width: 1px; height: 24px; background: rgba(90,173,224,0.3); margin: 0 5px; flex-shrink: 0; }

/* ── BOTTOM TOOLBAR — kids can reach on smartboard ──────────── */
.bottom-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 7px 14px 8px;
  background: rgba(90,173,224,0.12);
  border-top: 1px solid rgba(90,173,224,0.2);
  flex-shrink: 0;
}
.bottom-btn {
  font-family: var(--font); font-weight: 700; font-size: 0.85rem;
  border: 2px solid transparent; border-radius: 10px; padding: 7px 18px;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.duster-tool { background: #e8f4e8; border-color: #7ac07a; color: #3a7a3a; }
.duster-tool:hover { background: #7ac07a; color: white; }
.duster-tool.active { background: #e94560; border-color: #e94560; color: white; }
.bin-tool { background: #fce8e8; border-color: #e08080; color: #a03030; }
.bin-tool:hover { background: #e94560; border-color: #e94560; color: white; }

/* ── SETTINGS OVERLAY ───────────────────────────────────────── */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 100; display: none; align-items: center; justify-content: center;
}
.settings-overlay.open { display: flex; }
.settings-panel {
  background: #1e2a38; border-radius: 16px; padding: 20px 22px;
  width: min(440px, 92vw); max-height: 88vh; overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.sp-title { font-family: var(--font); font-size: 1.15rem; font-weight: 700; color: #b8d8f0; text-align: center; }
.sp-section { display: flex; flex-direction: column; gap: 7px; }
.sp-label { font-size: 0.7rem; font-weight: 700; color: #6a8aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.opt-row { display: flex; gap: 6px; flex-wrap: wrap; }
.opt-btn {
  font-family: var(--font); font-weight: 700; font-size: 0.75rem;
  border: 1.5px solid #2a3a4a; border-radius: 7px; padding: 5px 10px;
  background: #162030; color: #6a8aaa; cursor: pointer; transition: all 0.15s;
}
.opt-btn:hover { border-color: #5aade0; color: #a8d0f0; }
.opt-btn.active { background: #5aade0; color: white; border-color: #5aade0; }

.font-preview-row {
  background: #162030; border-radius: 8px; padding: 8px 12px;
  font-size: 1.3rem; color: #e0f0ff; letter-spacing: 0.5px;
}

.font-upload-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.font-upload-btn {
  font-family: var(--font); font-weight: 700; font-size: 0.72rem;
  background: #162030; border: 1.5px dashed #5aade0; border-radius: 7px;
  padding: 5px 12px; color: #5aade0; cursor: pointer; transition: all 0.15s;
}
.font-upload-btn:hover { background: #5aade0; color: white; }
.font-upload-status { font-size: 0.65rem; color: #4ade80; font-weight: 700; }

.sp-close {
  font-family: var(--font); font-weight: 700; font-size: 0.9rem;
  background: #5aade0; color: white; border: none; border-radius: 10px;
  padding: 10px; cursor: pointer; transition: all 0.15s; width: 100%;
}
.sp-close:hover { background: #3a8dc0; }
</style>
</head>
<body>

<!-- ── SETTINGS ──────────────────────────────────────────────── -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="sp-title">Settings</div>

    <div class="sp-section">
      <div class="sp-label">Font — choose or upload your own</div>
      <div class="opt-row" id="fontBtns"></div>
      <div class="font-preview-row" id="fontPreview">The quick brown fox jumps</div>
      <div class="font-upload-row">
        <button class="font-upload-btn" onclick="document.getElementById('fontFileIn').click()">📂 Load font file (.ttf / .otf)</button>
        <span class="font-upload-status" id="fontUploadStatus"></span>
        <input type="file" id="fontFileIn" accept=".ttf,.otf,.woff,.woff2" style="display:none" onchange="loadCustomFont(event)">
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-label">Letter Size</div>
      <div class="opt-row" id="sizeBtns">
        <button class="opt-btn" onclick="setSize(38)">Small</button>
        <button class="opt-btn active" onclick="setSize(52)">Medium</button>
        <button class="opt-btn" onclick="setSize(68)">Large</button>
        <button class="opt-btn" onclick="setSize(88)">X-Large</button>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-label">Background Lines</div>
      <div class="opt-row">
        <button class="opt-btn active" id="lineNone" onclick="setLines('none')">No lines</button>
        <button class="opt-btn" id="linePlain" onclick="setLines('plain')">Plain ruled</button>
        <button class="opt-btn" id="lineDotted" onclick="setLines('dotted')">Dotted thirds</button>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-label">Whiteboard Border Colour</div>
      <div class="opt-row">
        <button class="opt-btn active" onclick="setBorder('#5aade0','#e8f4fc')">Blue</button>
        <button class="opt-btn" onclick="setBorder('#7ac07a','#eef8ee')">Green</button>
        <button class="opt-btn" onclick="setBorder('#c09a50','#fdf6ee')">Warm</button>
        <button class="opt-btn" onclick="setBorder('#aaaaaa','#f5f5f5')">Grey</button>
      </div>
    </div>

    <button class="sp-close" onclick="closeSettings()">Done</button>
  </div>
</div>

<!-- ── WHITEBOARD FRAME ──────────────────────────────────────── -->
<div class="wb-frame" id="wbFrame">

  <!-- top bar — settings only -->
  <div class="top-bar">
    <a href="index.html" style="text-decoration:none;font-family:var(--font);font-weight:700;font-size:0.75rem;border:1.5px solid #5aade0;border-radius:7px;padding:4px 10px;background:white;color:#3a7aaa;cursor:pointer;transition:all 0.15s;">🏠 Home</a><div class="top-bar-title">Magnetic Letters</div>
    <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>
  </div>

  <!-- whiteboard writing area -->
  <div class="wb-area" id="wbArea">
    <svg class="wb-svg hidden" id="svgPlain"></svg>
    <svg class="wb-svg hidden" id="svgDotted"></svg>
    <div class="duster-cursor" id="dusterCursor"><svg width="44" height="28" viewBox="0 0 44 28" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="4" width="44" height="20" rx="4" fill="#f5a0a0" stroke="#c06060" stroke-width="1.5"/>
<rect x="0" y="4" width="16" height="20" rx="4" fill="#d07070" stroke="#c06060" stroke-width="1.5"/>
<rect x="6" y="8" width="4" height="12" rx="2" fill="#b05050" opacity="0.4"/>
<line x1="16" y1="6" x2="16" y2="22" stroke="#c06060" stroke-width="1"/>
</svg></div>
  </div>

  <!-- letter tray — lowercase first, uppercase below -->
  <div class="letter-tray">
    <div class="tray-label">Lowercase</div>
    <div class="tray-row" id="lowerRow"></div>
    <div class="tray-label" style="margin-top:4px">Uppercase</div>
    <div class="tray-row" id="upperRow"></div>
  </div>

  <!-- bottom bar — bin + duster, low for kids to reach -->
  <div class="bottom-bar">
    <button class="bottom-btn duster-tool" id="dusterBtn" onclick="toggleDuster()">
      🧽 Eraser
    </button>
    <button class="bottom-btn bin-tool" onclick="clearAll()">
      🗑 Bin it!
    </button>
  </div>

</div>

<script>
// ── FONTS ─────────────────────────────────────────────────────
const FONTS = [
  { key:'VIC Modern Cursive', label:'VIC Modern Cursive' },
  { key:'VIC Modern Print',   label:'VIC Modern Print'   },
  { key:'VIC Cursive',        label:'VIC Cursive'        },
  { key:'Patrick Hand',       label:'Patrick Hand'       },
  { key:'Andika',             label:'Andika (literacy)'  },
  { key:'Kalam',              label:'Kalam'              },
  { key:'Schoolbell',         label:'Schoolbell'         },
  { key:'Architects Daughter',label:'Architects Daughter'},
  { key:'Caveat',             label:'Caveat'             },
  { key:'Dancing Script',     label:'Dancing Script'     },
  { key:'Neucha',             label:'Neucha'             },
];

const LOWER = 'abcdefghijklmnopqrstuvwxyz'.split('');
const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const PUNCT = ['.','?'];

// ── STATE ─────────────────────────────────────────────────────
let currentFont  = 'VIC Modern Cursive';
let currentLines = 'none';
let letterSize   = 52;
let dusterActive = false;
let letters      = [];
let letterIdCtr  = 0;
let isDragging   = false;
let dragTarget   = null;
let customFontLoaded = false;

// ── INIT ──────────────────────────────────────────────────────
function init() {
  buildFontBtns();
  buildTray();
  drawLines();
  window.addEventListener('resize', drawLines);
}

// ── FONTS ─────────────────────────────────────────────────────
function buildFontBtns() {
  const container = document.getElementById('fontBtns');
  container.innerHTML = '';
  FONTS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (currentFont === f.key ? ' active' : '');
    btn.textContent = f.label;
    btn.style.fontFamily = `'${f.key}', cursive`;
    btn.onclick = () => setFont(f.key, false);
    container.appendChild(btn);
  });
  if (customFontLoaded) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (currentFont === 'CustomVic' ? ' active' : '');
    btn.textContent = '✓ Your uploaded font';
    btn.style.fontFamily = 'CustomVic, cursive';
    btn.onclick = () => setFont('CustomVic', true);
    container.appendChild(btn);
  }
}

function setFont(key, isCustom) {
  currentFont = key;
  const fontStr = isCustom ? `'CustomVic', cursive` : `'${key}', cursive`;
  document.documentElement.style.setProperty('--font', fontStr);
  document.getElementById('fontPreview').style.fontFamily = fontStr;
  document.querySelectorAll('.wb-letter, .tray-letter').forEach(el => el.style.fontFamily = fontStr);
  buildFontBtns();
}

function loadCustomFont(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const fontFace = new FontFace('CustomVic', ev.target.result);
    fontFace.load().then(loaded => {
      document.fonts.add(loaded);
      customFontLoaded = true;
      document.getElementById('fontUploadStatus').textContent = '✓ ' + file.name + ' loaded!';
      setFont('CustomVic', true);
      buildFontBtns();
    }).catch(() => {
      document.getElementById('fontUploadStatus').textContent = '⚠ Could not load font';
    });
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

// ── LETTER SIZE ───────────────────────────────────────────────
function setSize(s) {
  letterSize = s;
  document.documentElement.style.setProperty('--letter-size', s + 'px');
  document.querySelectorAll('#sizeBtns .opt-btn').forEach((b,i) => {
    b.classList.toggle('active', [38,52,68,88][i] === s);
  });
}

// ── LINES ─────────────────────────────────────────────────────
function setLines(type) {
  currentLines = type;
  document.getElementById('svgPlain').classList.toggle('hidden', type !== 'plain');
  document.getElementById('svgDotted').classList.toggle('hidden', type !== 'dotted');
  ['none','plain','dotted'].forEach(t => {
    const ids = {none:'lineNone',plain:'linePlain',dotted:'lineDotted'};
    document.getElementById(ids[t]).classList.toggle('active', t === type);
  });
  drawLines();
}

function drawLines() {
  const wb = document.getElementById('wbArea');
  const W = wb.clientWidth, H = wb.clientHeight;

  // Plain ruled
  const ps = document.getElementById('svgPlain');
  ps.setAttribute('viewBox',`0 0 ${W} ${H}`);
  ps.innerHTML = '';
  const sp = 66;
  for (let y = sp; y < H; y += sp) {
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1','0');l.setAttribute('y1',y);l.setAttribute('x2',W);l.setAttribute('y2',y);
    l.setAttribute('stroke','rgba(100,140,200,0.22)');l.setAttribute('stroke-width','1');
    ps.appendChild(l);
  }

  // Dotted thirds — Victorian style
  const ds = document.getElementById('svgDotted');
  ds.setAttribute('viewBox',`0 0 ${W} ${H}`);
  ds.innerHTML = '';
  const bh = 80, pad = 16;
  for (let y = pad; y < H; y += bh) {
    // ascender line (top)
    const tl = document.createElementNS('http://www.w3.org/2000/svg','line');
    tl.setAttribute('x1','0');tl.setAttribute('y1',y);tl.setAttribute('x2',W);tl.setAttribute('y2',y);
    tl.setAttribute('stroke','rgba(90,173,224,0.15)');tl.setAttribute('stroke-width','0.8');
    ds.appendChild(tl);

    // dotted midline
    const my = y + bh * 0.44;
    for (let x = 0; x < W; x += 9) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',x);dot.setAttribute('cy',my);dot.setAttribute('r','1.3');
      dot.setAttribute('fill','rgba(200,100,100,0.2)');
      ds.appendChild(dot);
    }

    // baseline
    const bl = document.createElementNS('http://www.w3.org/2000/svg','line');
    const by = y + bh * 0.72;
    bl.setAttribute('x1','0');bl.setAttribute('y1',by);bl.setAttribute('x2',W);bl.setAttribute('y2',by);
    bl.setAttribute('stroke','rgba(90,173,224,0.28)');bl.setAttribute('stroke-width','1');
    ds.appendChild(bl);
  }
}

// ── BORDER COLOUR ─────────────────────────────────────────────
function setBorder(border, bg) {
  document.documentElement.style.setProperty('--border-color', border);
  document.documentElement.style.setProperty('--outer-bg', bg);
  document.body.style.background = bg;
  document.querySelectorAll('.sp-section:nth-child(4) .opt-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ── TRAY BUILD ────────────────────────────────────────────────
function buildTray() {
  const lowerRow = document.getElementById('lowerRow');
  const upperRow = document.getElementById('upperRow');

  // lowercase first
  LOWER.forEach(ch => lowerRow.appendChild(makeTrayLetter(ch)));
  lowerRow.appendChild(makeDivider());
  PUNCT.forEach(ch => lowerRow.appendChild(makeTrayLetter(ch)));

  // uppercase below
  UPPER.forEach(ch => upperRow.appendChild(makeTrayLetter(ch)));
}

function makeDivider() {
  const d = document.createElement('div'); d.className = 'tray-divider'; return d;
}

function makeTrayLetter(char) {
  const el = document.createElement('div');
  el.className = 'tray-letter';
  el.textContent = char;
  el.dataset.char = char;
  el.addEventListener('pointerdown', e => { e.preventDefault(); startTrayDrag(char, e); });
  return el;
}

// ── DRAG FROM TRAY ────────────────────────────────────────────
function startTrayDrag(char, e) {
  if (dusterActive) return;
  isDragging = true;

  const clone = document.createElement('div');
  clone.className = 'wb-letter';
  clone.textContent = char;
  clone.style.position = 'fixed';
  clone.style.pointerEvents = 'none';
  clone.style.zIndex = '50';
  clone.style.opacity = '0.7';
  clone.style.fontSize = letterSize + 'px';
  positionClone(clone, e.clientX, e.clientY);
  document.body.appendChild(clone);

  dragTarget = { type: 'tray', char, clone };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup',   onUp);
}

function positionClone(clone, cx, cy) {
  clone.style.left = (cx - letterSize * 0.25) + 'px';
  clone.style.top  = (cy - letterSize * 0.8)  + 'px';
}

// ── DRAG WB LETTER ────────────────────────────────────────────
function startWbDrag(obj, e) {
  if (dusterActive) { removeLetter(obj.id); return; }
  isDragging = true;
  const rect = obj.el.getBoundingClientRect();
  dragTarget = {
    type: 'wb', id: obj.id, el: obj.el,
    ox: e.clientX - rect.left,
    oy: e.clientY - rect.top,
  };
  obj.el.style.zIndex = '20';
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup',   onUp);
}

// ── POINTER MOVE ──────────────────────────────────────────────
function onMove(e) {
  if (!isDragging || !dragTarget) return;
  if (dragTarget.type === 'tray') {
    positionClone(dragTarget.clone, e.clientX, e.clientY);
  } else {
    const wb = document.getElementById('wbArea');
    const r  = wb.getBoundingClientRect();
    const x  = e.clientX - r.left - dragTarget.ox;
    const y  = e.clientY - r.top  - dragTarget.oy;
    dragTarget.el.style.left = Math.max(-10, x) + 'px';
    dragTarget.el.style.top  = Math.max(-10, y) + 'px';
    const obj = letters.find(l => l.id === dragTarget.id);
    if (obj) { obj.x = x; obj.y = y; }
  }
}

// ── POINTER UP ────────────────────────────────────────────────
function onUp(e) {
  window.removeEventListener('pointermove', onMove);
  window.removeEventListener('pointerup',   onUp);
  if (!isDragging || !dragTarget) { isDragging = false; return; }

  if (dragTarget.type === 'tray') {
    dragTarget.clone.remove();
    const wb = document.getElementById('wbArea');
    const r  = wb.getBoundingClientRect();
    const onWb = e.clientX >= r.left && e.clientX <= r.right &&
                 e.clientY >= r.top  && e.clientY <= r.bottom;
    if (onWb) {
      addToWb(dragTarget.char,
        e.clientX - r.left - letterSize * 0.25,
        e.clientY - r.top  - letterSize * 0.8);
    }
  } else {
    dragTarget.el.style.zIndex = '5';
  }
  isDragging = false; dragTarget = null;
}

// ── ADD LETTER TO WB ──────────────────────────────────────────
function addToWb(char, x, y) {
  const id = ++letterIdCtr;
  const el = document.createElement('div');
  el.className = 'wb-letter';
  el.textContent = char;
  el.style.left = Math.max(0, x) + 'px';
  el.style.top  = Math.max(0, y) + 'px';
  el.style.fontSize = letterSize + 'px';
  el.addEventListener('pointerdown', e => {
    e.preventDefault(); e.stopPropagation();
    const obj = letters.find(l => l.id === id);
    if (obj) startWbDrag(obj, e);
  });
  document.getElementById('wbArea').appendChild(el);
  const obj = { id, char, x, y, el };
  letters.push(obj);
  return obj;
}

function removeLetter(id) {
  const idx = letters.findIndex(l => l.id === id);
  if (idx === -1) return;
  letters[idx].el.remove();
  letters.splice(idx, 1);
}

function clearAll() {
  letters.forEach(l => l.el.remove());
  letters = [];
}

// ── DUSTER ────────────────────────────────────────────────────
function toggleDuster() {
  dusterActive = !dusterActive;
  const btn = document.getElementById('dusterBtn');
  btn.classList.toggle('active', dusterActive);
  btn.textContent = dusterActive ? '🧽 Eraser ON' : '🧽 Eraser';

  const wb = document.getElementById('wbArea');
  if (dusterActive) {
    wb.style.cursor = 'none';
    wb.addEventListener('pointermove', wbDusterMove);
    wb.addEventListener('pointerdown', wbDusterDown);
    wb.addEventListener('pointerleave', hideCursor);
    wb.addEventListener('pointerenter', showCursor);
  } else {
    wb.style.cursor = 'default';
    wb.removeEventListener('pointermove', wbDusterMove);
    wb.removeEventListener('pointerdown', wbDusterDown);
    wb.removeEventListener('pointerleave', hideCursor);
    wb.removeEventListener('pointerenter', showCursor);
    hideCursor();
  }
}

function wbDusterMove(e) {
  moveCursor(e);
  if (e.buttons > 0) eraseAt(e.clientX, e.clientY);
}

function wbDusterDown(e) {
  eraseAt(e.clientX, e.clientY);
  window.addEventListener('pointermove', globalDusterMove);
  window.addEventListener('pointerup',   stopGlobalDuster);
}

function globalDusterMove(e) { moveCursor(e); eraseAt(e.clientX, e.clientY); }
function stopGlobalDuster() {
  window.removeEventListener('pointermove', globalDusterMove);
  window.removeEventListener('pointerup',   stopGlobalDuster);
}

function moveCursor(e) {
  const wb = document.getElementById('wbArea');
  const r  = wb.getBoundingClientRect();
  const cur = document.getElementById('dusterCursor');
  cur.style.left = (e.clientX - r.left) + 'px';
  cur.style.top  = (e.clientY - r.top)  + 'px';
}
function showCursor() { document.getElementById('dusterCursor').classList.add('visible'); }
function hideCursor() { document.getElementById('dusterCursor').classList.remove('visible'); }

function eraseAt(cx, cy) {
  const toRemove = [];
  letters.forEach(l => {
    const r = l.el.getBoundingClientRect();
    if (cx >= r.left-15 && cx <= r.right+15 && cy >= r.top-15 && cy <= r.bottom+15)
      toRemove.push(l.id);
  });
  toRemove.forEach(id => removeLetter(id));
}

// ── SETTINGS ─────────────────────────────────────────────────
function openSettings()  { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
document.getElementById('settingsOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
});

init();
</script>
</body>
</html>
