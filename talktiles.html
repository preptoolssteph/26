<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TalkTiles — AAC Communication Board</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1e1408; --bg2: #2a1e0e; --bg3: #3d2e1a;
  --cream: #fdf6ee; --cream2: #f5eddf; --cream3: #ede5da;
  --orange: #ff874d; --orange2: #e65100;
  --brown: #795548; --brown2: #4a3a20;
  --green: #4ade80; --green2: #1a3020;
  --blue: #64b5f6; --pink: #f48fb1; --yellow: #ffd54f;
  --purple: #ce93d8; --red: #ef5350;
  --cols: 5; --rows: 4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--cream); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

/* ── MESSAGE BAR ─────────────────────────────────────────── */
.msg-bar {
  background: var(--bg2); border-bottom: 2px solid var(--bg3);
  display: flex; align-items: stretch; padding: 6px; gap: 6px;
  min-height: 70px; flex-shrink: 0;
}
.msg-symbols {
  flex: 1; display: flex; gap: 4px; align-items: center;
  overflow-x: auto; padding: 4px 8px;
  background: var(--bg3); border-radius: 8px;
  min-height: 56px;
}
.msg-word {
  display: flex; flex-direction: column; align-items: center;
  gap: 2px; padding: 3px 5px; min-width: 48px;
  background: var(--bg2); border-radius: 6px;
  transition: transform 0.1s;
}
.msg-word:hover { transform: scale(1.08); }
.msg-word img { width: 34px; height: 34px; object-fit: contain; border-radius: 4px; }
.msg-word .mw-emoji { font-size: 1.4rem; line-height: 34px; }
.msg-word span { font-size: 0.42rem; color: var(--cream3); font-weight: 700; }
.msg-controls { display: flex; flex-direction: column; gap: 4px; }
.msg-btn {
  border: none; border-radius: 6px; font-family: 'Nunito',sans-serif;
  font-weight: 800; font-size: 0.6rem; cursor: pointer;
  padding: 4px 10px; transition: all 0.12s;
}
.msg-speak { background: var(--orange); color: #fff; flex: 1; font-size: 0.7rem; }
.msg-speak:hover { background: var(--orange2); }
.msg-clear { background: var(--bg3); color: var(--cream3); }
.msg-clear:hover { background: var(--red); color: #fff; }
.msg-text {
  font-size: 0.55rem; color: var(--cream3); padding: 2px 8px;
  background: var(--bg2); min-height: 18px;
  display: flex; align-items: center; flex-shrink: 0;
}
.msg-text .translation { margin-left: 8px; color: var(--blue); }

/* ── LANGUAGE SELECTOR ───────────────────────────────────── */
.lang-bar {
  display: flex; gap: 3px; padding: 4px 8px;
  background: var(--bg2); flex-shrink: 0;
  align-items: center; border-bottom: 1px solid var(--bg3);
}
.lang-bar label { font-size: 0.5rem; color: var(--brown); font-weight: 800; margin-right: 4px; }
.lang-btn {
  border: 1.5px solid var(--bg3); background: transparent;
  color: var(--cream3); font-family: 'Nunito',sans-serif;
  font-weight: 700; font-size: 0.5rem; padding: 3px 8px;
  border-radius: 4px; cursor: pointer; transition: all 0.12s;
}
.lang-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }
.lang-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

/* ── NAV BAR ─────────────────────────────────────────────── */
.nav-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; background: var(--bg2);
  border-bottom: 2px solid var(--bg3); flex-shrink: 0;
}
.nav-back {
  border: none; background: var(--bg3); color: var(--orange);
  font-family: 'Nunito',sans-serif; font-weight: 800;
  font-size: 0.7rem; padding: 6px 14px; border-radius: 6px;
  cursor: pointer; transition: all 0.12s; display: none;
}
.nav-back.show { display: block; }
.nav-back:hover { background: var(--orange); color: #fff; }
.nav-title { font-size: 0.85rem; font-weight: 900; color: var(--cream); }
.nav-spacer { flex: 1; }
.nav-btn {
  border: none; background: var(--bg3); color: var(--cream3);
  font-family: 'Nunito',sans-serif; font-weight: 700;
  font-size: 0.55rem; padding: 5px 10px; border-radius: 5px;
  cursor: pointer; transition: all 0.12s;
}
.nav-btn:hover { background: var(--orange); color: #fff; }
.nav-btn.active-edit { background: var(--green2); color: var(--green); border: 1.5px solid var(--green); }

/* ── GRID ────────────────────────────────────────────────── */
.grid-wrap {
  flex: 1; overflow-y: auto; padding: 10px;
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  grid-template-rows: repeat(var(--rows), 1fr);
  gap: 8px; align-content: start;
}
.tile {
  background: var(--cream); border-radius: 12px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding: 8px 4px;
  cursor: pointer; transition: all 0.12s;
  border: 3px solid transparent;
  min-height: 0; overflow: hidden;
  position: relative;
}
.tile:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.tile:active { transform: scale(0.97); }
.tile.cat-tile { border-color: var(--orange); }
.tile img {
  width: 60%; max-height: 55%; object-fit: contain;
  flex-shrink: 1; min-height: 0;
}
.tile .tile-emoji { font-size: 2.2rem; flex-shrink: 0; }
.tile .tile-label {
  font-size: 0.65rem; font-weight: 800; color: var(--bg);
  text-align: center; line-height: 1.15;
  max-width: 100%; overflow: hidden; word-break: break-word;
}
.tile .tile-sub {
  font-size: 0.42rem; font-weight: 700; color: var(--brown);
  text-align: center;
}
.tile.add-tile {
  background: var(--bg3); border: 2px dashed var(--brown);
  color: var(--brown); cursor: pointer;
}
.tile.add-tile:hover { border-color: var(--green); color: var(--green); }
.tile .tile-delete {
  position: absolute; top: 3px; right: 5px;
  font-size: 0.6rem; color: var(--red); cursor: pointer;
  display: none; background: rgba(255,255,255,0.9);
  border-radius: 50%; width: 18px; height: 18px;
  align-items: center; justify-content: center;
}
.editing .tile .tile-delete { display: flex; }
.tile.empty-tile { background: transparent; border: 1px dashed var(--bg3); cursor: default; }
.tile.empty-tile:hover { transform: none; box-shadow: none; }

/* Color coding by word type (Fitzgerald Key) */
.tile[data-type="verb"]      { border-left: 5px solid #4caf50; }
.tile[data-type="noun"]      { border-left: 5px solid #ff9800; }
.tile[data-type="adjective"] { border-left: 5px solid #2196f3; }
.tile[data-type="social"]    { border-left: 5px solid #e91e63; }
.tile[data-type="question"]  { border-left: 5px solid #9c27b0; }
.tile[data-type="pronoun"]   { border-left: 5px solid #ffd54f; }
.tile[data-type="category"]  { border-left: 5px solid var(--orange); }

/* ── SETTINGS PANEL ──────────────────────────────────────── */
.settings-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.settings-overlay.show { display: flex; }
.settings-panel {
  background: var(--bg2); border: 2px solid var(--bg3);
  border-radius: 12px; padding: 20px; width: 340px;
  max-height: 80vh; overflow-y: auto;
}
.settings-panel h3 { font-size: 0.9rem; color: var(--orange); margin-bottom: 12px; }
.settings-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.settings-row label { font-size: 0.6rem; color: var(--cream3); font-weight: 700; width: 80px; }
.settings-row input[type=range] {
  flex: 1; -webkit-appearance: none; height: 4px;
  background: var(--bg3); border-radius: 2px;
}
.settings-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: var(--orange); cursor: pointer;
}
.settings-row .val { font-size: 0.65rem; color: var(--orange); font-weight: 800; width: 24px; text-align: center; }
.settings-close {
  margin-top: 12px; width: 100%; padding: 8px;
  border: none; border-radius: 6px; background: var(--orange);
  color: #fff; font-family: 'Nunito',sans-serif;
  font-weight: 800; font-size: 0.7rem; cursor: pointer;
}

/* ── EDIT MODAL ──────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2); border: 2px solid var(--bg3);
  border-radius: 12px; padding: 20px; width: 340px;
}
.modal h3 { font-size: 0.8rem; color: var(--orange); margin-bottom: 10px; }
.modal label { font-size: 0.55rem; color: var(--cream3); font-weight: 700; display: block; margin: 8px 0 3px; }
.modal input[type=text], .modal select {
  width: 100%; padding: 6px 8px; border: 1.5px solid var(--bg3);
  border-radius: 5px; background: var(--bg); color: var(--cream);
  font-family: 'Nunito',sans-serif; font-size: 0.6rem;
}
.modal .img-preview {
  width: 60px; height: 60px; object-fit: contain;
  border-radius: 6px; background: var(--cream3); margin: 6px 0;
}
.modal .btn-row { display: flex; gap: 6px; margin-top: 12px; }
.modal .btn-row button {
  flex: 1; padding: 7px; border: none; border-radius: 6px;
  font-family: 'Nunito',sans-serif; font-weight: 800;
  font-size: 0.6rem; cursor: pointer;
}
.modal .btn-save { background: var(--orange); color: #fff; }
.modal .btn-cancel { background: var(--bg3); color: var(--cream3); }
</style>
</head>
<body>

<!-- MESSAGE BAR -->
<div class="msg-bar">
  <div class="msg-symbols" id="msgSymbols"></div>
  <div class="msg-controls">
    <button class="msg-btn msg-speak" onclick="speakMessage()">▶ Speak</button>
    <button class="msg-btn msg-clear" onclick="clearMessage()">✕ Clear</button>
  </div>
</div>
<div class="msg-text" id="msgText"><span id="msgEnglish"></span><span class="translation" id="msgTranslation"></span></div>

<!-- LANGUAGE SELECTOR -->
<div class="lang-bar">
  <label>Read in:</label>
  <button class="lang-btn active" data-lang="en" onclick="setLang('en')">English</button>
  <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" data-lang="ja" onclick="setLang('ja')">日本語</button>
  <button class="lang-btn" data-lang="ko" onclick="setLang('ko')">한국어</button>
  <button class="lang-btn" data-lang="es" onclick="setLang('es')">Español</button>
</div>

<!-- NAV BAR -->
<div class="nav-bar">
  <a href="index.html" class="nav-btn" style="text-decoration:none;">🏠 Home</a>
  <button class="nav-back" id="navBack" onclick="goHome()">← Home</button>
  <div class="nav-title" id="navTitle">TalkTiles</div>
  <div class="nav-spacer"></div>
  <button class="nav-btn" id="editBtn" onclick="toggleEdit()">✏️ Edit</button>
  <button class="nav-btn" onclick="exportTT()">📤</button>
  <button class="nav-btn" onclick="document.getElementById('importTTFile').click()">📥</button>
  <input type="file" id="importTTFile" accept=".json" style="display:none" onchange="importTT(event)">
  <button class="nav-btn" onclick="openSettings()">⚙️</button>
</div>

<!-- GRID -->
<div class="grid-wrap" id="grid"></div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <h3>⚙️ Settings</h3>
    <div class="settings-row">
      <label>Columns</label>
      <input type="range" min="2" max="8" value="5" id="setCols" oninput="updateGrid()">
      <span class="val" id="colsVal">5</span>
    </div>
    <div class="settings-row">
      <label>Rows</label>
      <input type="range" min="2" max="6" value="4" id="setRows" oninput="updateGrid()">
      <span class="val" id="rowsVal">4</span>
    </div>
    <div class="settings-row">
      <label>Voice speed</label>
      <input type="range" min="5" max="15" value="8" id="setSpeed" oninput="document.getElementById('speedVal').textContent=(this.value/10).toFixed(1)">
      <span class="val" id="speedVal">0.8</span>
    </div>
    <div class="settings-row" style="flex-direction:column;align-items:stretch;gap:6px;">
      <label style="width:auto;">Voice</label>
      <select id="voiceSelect" onchange="setVoice(this.value)" style="width:100%;padding:6px;border-radius:5px;background:var(--bg);color:var(--cream);border:1.5px solid var(--bg3);font-family:'Nunito',sans-serif;font-size:0.6rem;">
        <option value="">Default</option>
      </select>
      <button onclick="testVoice()" style="padding:5px 10px;border:none;border-radius:5px;background:var(--bg3);color:var(--cream);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.55rem;cursor:pointer;">▶ Test voice</button>
    </div>
    <button class="settings-close" onclick="closeSettings()">Done</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">Add Word</h3>
    <label>English word</label>
    <input type="text" id="mEn" placeholder="e.g. apple">
    <label>Chinese (中文)</label>
    <input type="text" id="mZh" placeholder="e.g. 苹果">
    <label>Japanese (日本語)</label>
    <input type="text" id="mJa" placeholder="e.g. りんご">
    <label>Korean (한국어)</label>
    <input type="text" id="mKo" placeholder="e.g. 사과">
    <label>Spanish (Español)</label>
    <input type="text" id="mEs" placeholder="e.g. manzana">
    <label>Emoji (or upload image below)</label>
    <input type="text" id="mEmoji" placeholder="e.g. 🍎">
    <label>Image</label>
    <input type="file" accept="image/*" id="mImgFile" onchange="previewModalImg(event)" style="font-size:0.5rem;color:var(--cream3)">
    <img class="img-preview" id="mImgPreview" style="display:none">
    <label>Word type</label>
    <select id="mType">
      <option value="noun">Noun (thing)</option>
      <option value="verb">Verb (action)</option>
      <option value="adjective">Adjective (describing)</option>
      <option value="social">Social</option>
      <option value="question">Question</option>
      <option value="pronoun">Pronoun</option>
      <option value="category">Category / Folder</option>
    </select>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<input type="file" id="imgFileHidden" accept="image/*" style="display:none">

// Load or init categories — version bump forces reload of defaults
const CAT_VERSION = 3;
let categories = load('cats', null);
let catVersion = load('catVersion', 0);
if(!categories || catVersion < CAT_VERSION) {
  categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  save('cats', categories);
  save('catVersion', CAT_VERSION);
}

let currentCat = null; // null = home
let message = []; // array of word objects in message bar
let currentLang = load('lang', 'en');
let editing = false;
let editTarget = null; // {catIdx, itemIdx} or null for new
let gridCols = load('cols', 5);
let gridRows = load('rows', 4);

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  document.documentElement.style.setProperty('--cols', gridCols);
  document.documentElement.style.setProperty('--rows', gridRows);
  
  const back = document.getElementById('navBack');
  const title = document.getElementById('navTitle');
  
  if(currentCat === null){
    // HOME — show category tiles
    back.classList.remove('show');
    title.textContent = 'TalkTiles';
    
    categories.forEach((cat, ci) => {
      const tile = makeTile(cat, () => {
        if(editing) { editTarget = {catIdx:ci}; openModal(cat); }
        else { currentCat = ci; render(); }
      }, ci, true);
      grid.appendChild(tile);
    });
    
    if(editing){
      grid.appendChild(makeAddTile(() => { editTarget = {catIdx:-1}; openModal(null, true); }));
    }
  } else {
    // INSIDE A CATEGORY
    const cat = categories[currentCat];
    back.classList.add('show');
    title.textContent = cat[currentLang] || cat.en;
    
    (cat.items||[]).forEach((item, ii) => {
      const tile = makeTile(item, () => {
        if(editing) { editTarget = {catIdx:currentCat, itemIdx:ii}; openModal(item); }
        else { addToMessage(item); }
      }, ii, false, cat.textOnly);
      grid.appendChild(tile);
    });
    
    if(editing){
      grid.appendChild(makeAddTile(() => { editTarget = {catIdx:currentCat, itemIdx:-1}; openModal(null); }));
    }
  }
  
  grid.classList.toggle('editing', editing);
  document.getElementById('editBtn').classList.toggle('active-edit', editing);
  renderMessage();
}

function makeTile(item, onClick, idx, isCat, textOnly){
  const div = document.createElement('div');
  div.className = 'tile' + (isCat ? ' cat-tile' : '');
  div.setAttribute('data-type', item.type || 'noun');
  
  // Show image/emoji unless textOnly (and not a category tile on home)
  const showVisual = isCat || !textOnly;
  
  if(showVisual && item.imgData){
    const img = document.createElement('img');
    img.src = item.imgData;
    div.appendChild(img);
  } else if(showVisual && item.emoji){
    const em = document.createElement('div');
    em.className = 'tile-emoji';
    em.textContent = item.emoji;
    div.appendChild(em);
  }
  
  const lbl = document.createElement('div');
  lbl.className = 'tile-label';
  lbl.textContent = item.en || '';
  if(!showVisual) lbl.style.fontSize = '0.9rem';
  div.appendChild(lbl);
  
  // Show translation below if not English
  if(currentLang !== 'en' && item[currentLang]){
    const sub = document.createElement('div');
    sub.className = 'tile-sub';
    sub.textContent = item[currentLang];
    if(!showVisual) sub.style.fontSize = '0.55rem';
    div.appendChild(sub);
  }
  
  div.onclick = onClick;
  
  // Delete button in edit mode
  const del = document.createElement('div');
  del.className = 'tile-delete';
  del.textContent = '✕';
  del.onclick = (e) => { e.stopPropagation(); deleteItem(isCat ? idx : null, isCat ? null : idx); };
  div.appendChild(del);
  
  return div;
}

function makeAddTile(onClick){
  const div = document.createElement('div');
  div.className = 'tile add-tile';
  div.innerHTML = '<div class="tile-emoji">+</div><div class="tile-label">Add</div>';
  div.onclick = onClick;
  return div;
}

// ═══════════════════════════════════════════════════════════════
// MESSAGE BAR
// ═══════════════════════════════════════════════════════════════
function addToMessage(item){
  message.push(item);
  renderMessage();
  // Quick speak the individual word
  speakWord(item);
}

function renderMessage(){
  const cont = document.getElementById('msgSymbols');
  cont.innerHTML = '';
  message.forEach((w, i) => {
    const div = document.createElement('div');
    div.className = 'msg-word';
    if(w.imgData){
      const img = document.createElement('img');
      img.src = w.imgData; div.appendChild(img);
    } else if(w.emoji){
      const em = document.createElement('div');
      em.className = 'mw-emoji'; em.textContent = w.emoji; div.appendChild(em);
    }
    const sp = document.createElement('span');
    sp.textContent = w.en; div.appendChild(sp);
    div.onclick = () => { message.splice(i,1); renderMessage(); };
    cont.appendChild(div);
  });
  
  // Update text
  const enText = message.map(w => w.en).join(' ');
  document.getElementById('msgEnglish').textContent = enText;
  
  const transText = message.map(w => w[currentLang] || w.en).join(' ');
  const transEl = document.getElementById('msgTranslation');
  if(currentLang !== 'en' && message.length > 0){
    transEl.textContent = '→ ' + transText;
  } else {
    transEl.textContent = '';
  }
}

function clearMessage(){ message = []; renderMessage(); }

// ═══════════════════════════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════════════════════════
const LANG_CODES = { en:'en-AU', zh:'zh-CN', ja:'ja-JP', ko:'ko-KR', es:'es-ES' };

function speakWord(item){
  const text = item[currentLang] || item.en;
  speak(text, currentLang);
}

function speakMessage(){
  if(message.length === 0) return;
  const text = message.map(w => w[currentLang] || w.en).join(', ');
  speak(text, currentLang);
}

function speak(text, lang){
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = LANG_CODES[lang] || 'en-AU';
  u.rate = (+document.getElementById('setSpeed').value || 8) / 10;
  
  const voices = window.speechSynthesis.getVoices();
  // Use selected voice if set, otherwise find a matching language voice
  if(selectedVoiceName){
    const picked = voices.find(v => v.name === selectedVoiceName);
    if(picked) u.voice = picked;
  } else {
    const match = voices.find(v => v.lang.startsWith(LANG_CODES[lang]?.split('-')[0]));
    if(match) u.voice = match;
  }
  
  window.speechSynthesis.speak(u);
}

// Pre-load voices
let selectedVoiceName = load('voiceName', '');
function populateVoices(){
  const sel = document.getElementById('voiceSelect');
  const voices = window.speechSynthesis.getVoices();
  sel.innerHTML = '<option value="">Default</option>';
  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    if(v.name === selectedVoiceName) opt.selected = true;
    sel.appendChild(opt);
  });
}
function setVoice(name){ selectedVoiceName = name; save('voiceName', name); }
function testVoice(){
  const testPhrases = {en:'Hello, I am ready to help!',zh:'你好，我准备好了！',ja:'こんにちは、準備ができました！',ko:'안녕하세요, 준비되었습니다!',es:'¡Hola, estoy listo para ayudar!'};
  speak(testPhrases[currentLang]||testPhrases.en, currentLang);
}
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); populateVoices(); };
setTimeout(populateVoices, 500);

// ═══════════════════════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════════════════════
function setLang(lang){
  currentLang = lang;
  save('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  render();
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function goHome(){ currentCat = null; render(); }

// ═══════════════════════════════════════════════════════════════
// EDIT MODE
// ═══════════════════════════════════════════════════════════════
function toggleEdit(){
  editing = !editing;
  render();
}

function openModal(item, isCategory){
  const modal = document.getElementById('editModal');
  modal.classList.add('show');
  document.getElementById('modalTitle').textContent = item ? 'Edit' : 'Add New';
  document.getElementById('mEn').value = item?.en || '';
  document.getElementById('mZh').value = item?.zh || '';
  document.getElementById('mJa').value = item?.ja || '';
  document.getElementById('mKo').value = item?.ko || '';
  document.getElementById('mEs').value = item?.es || '';
  document.getElementById('mEmoji').value = item?.emoji || '';
  document.getElementById('mType').value = item?.type || (isCategory ? 'category' : 'noun');
  
  const prev = document.getElementById('mImgPreview');
  if(item?.imgData){ prev.src = item.imgData; prev.style.display = 'block'; }
  else { prev.style.display = 'none'; }
}

function closeModal(){
  document.getElementById('editModal').classList.remove('show');
  editTarget = null;
}

function previewModalImg(e){
  const f = e.target.files[0]; if(!f) return;
  const fr = new FileReader();
  fr.onload = ev => {
    document.getElementById('mImgPreview').src = ev.target.result;
    document.getElementById('mImgPreview').style.display = 'block';
  };
  fr.readAsDataURL(f);
}

function saveModal(){
  const data = {
    en: document.getElementById('mEn').value,
    zh: document.getElementById('mZh').value,
    ja: document.getElementById('mJa').value,
    ko: document.getElementById('mKo').value,
    es: document.getElementById('mEs').value,
    emoji: document.getElementById('mEmoji').value,
    type: document.getElementById('mType').value,
  };
  
  const prev = document.getElementById('mImgPreview');
  if(prev.style.display !== 'none' && prev.src && prev.src.startsWith('data:')){
    data.imgData = prev.src;
  }
  
  if(!editTarget) { closeModal(); return; }
  
  if(editTarget.catIdx === -1){
    // New category
    data.items = [];
    data.id = 'custom_' + Date.now();
    categories.push(data);
  } else if(editTarget.itemIdx === undefined){
    // Editing a category
    Object.assign(categories[editTarget.catIdx], data);
  } else if(editTarget.itemIdx === -1){
    // New item in category
    categories[editTarget.catIdx].items.push(data);
  } else {
    // Editing existing item
    Object.assign(categories[editTarget.catIdx].items[editTarget.itemIdx], data);
  }
  
  save('cats', categories);
  closeModal();
  render();
}

function deleteItem(catIdx, itemIdx){
  if(catIdx !== null){
    if(!confirm('Delete category "' + categories[catIdx].en + '" and all its words?')) return;
    categories.splice(catIdx, 1);
  } else if(itemIdx !== null && currentCat !== null){
    categories[currentCat].items.splice(itemIdx, 1);
  }
  save('cats', categories);
  render();
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════
function openSettings(){ document.getElementById('settingsOverlay').classList.add('show'); }
function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('show'); }

function updateGrid(){
  gridCols = +document.getElementById('setCols').value;
  gridRows = +document.getElementById('setRows').value;
  document.getElementById('colsVal').textContent = gridCols;
  document.getElementById('rowsVal').textContent = gridRows;
  save('cols', gridCols);
  save('rows', gridRows);
  render();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.getElementById('setCols').value = gridCols;
document.getElementById('setRows').value = gridRows;
document.getElementById('colsVal').textContent = gridCols;
document.getElementById('rowsVal').textContent = gridRows;
setLang(currentLang);
render();

// ── SHARE TO BOARD ────────────────────────────────────────────
function exportTT(){
  const data = {
    app: 'TalkTiles',
    version: 1,
    categories: categories,
    gridCols: gridCols,
    gridRows: gridRows,
    lang: currentLang,
    voiceName: selectedVoiceName,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'talktiles-share.json'; a.click();
  URL.revokeObjectURL(url);
  alert('Saved! Put this file on Google Drive or USB, then open it on your smartboard with "Load from File".');
}
function importTT(e){
  const f = e.target.files[0]; if(!f) return;
  const fr = new FileReader();
  fr.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.app !== 'TalkTiles'){ alert('Wrong file — this is not a TalkTiles share file.'); return; }
      categories = data.categories;
      gridCols = data.gridCols || 5;
      gridRows = data.gridRows || 4;
      if(data.lang) currentLang = data.lang;
      if(data.voiceName) selectedVoiceName = data.voiceName;
      save('cats', categories);
      save('cols', gridCols); save('rows', gridRows);
      save('lang', currentLang); save('voiceName', selectedVoiceName);
      document.getElementById('setCols').value = gridCols;
      document.getElementById('setRows').value = gridRows;
      setLang(currentLang);
      render();
      alert('Loaded! All categories and words are ready.');
    } catch(err) { alert('Could not read file: ' + err.message); }
  };
  fr.readAsText(f);
  e.target.value = '';
}
